name: Build APKs

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Download MediaPipe face landmarker model
        run: |
          mkdir -p app/src/main/assets
          curl -L --fail --retry 3 -o app/src/main/assets/face_landmarker.task \
            "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task"
          ls -lh app/src/main/assets/face_landmarker.task

      - name: Unit tests
        run: gradle testDebugUnitTest --stacktrace

      - name: Assemble debug APK
        run: gradle assembleDebug --stacktrace

      - name: Assemble release APK
        run: gradle assembleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: eye-scroll-debug-apk
          path: Development/app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: eye-scroll-release-apk
          path: Development/app/build/outputs/apk/release/*.apk
